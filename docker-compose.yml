services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lebanon
      POSTGRES_PASSWORD: lebanon
      POSTGRES_DB: lebanon
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lebanon -d lebanon"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      DATABASE_URL: postgres://lebanon:lebanon@db:5433/lebanon
      DATABASE_SSL: "false"
      NODE_ENV: production
      PORT: "3001"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
