# Render Blueprint — deploys the site + a free PostgreSQL database.
# In Render: New + → Blueprint → connect your repo → Apply.
services:
  - type: web
    name: lebanon-crisis-site
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: lebanon-db
          property: connectionString

databases:
  - name: lebanon-db
    plan: free
    databaseName: lebanon
    user: lebanon
